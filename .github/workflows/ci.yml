name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do cˇdigo
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependŕncias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar lint com flake8
        run: |
          flake8 . --max-line-length=100

      - name: Executar testes com coverage
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Publicar relatˇrio de coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
